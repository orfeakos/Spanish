<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E9DCC6">
<title>Sendero · Spanish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1E7D6; --bg2:#E9DCC6; --surface:#FBF6EE; --surface2:#F5ECDD;
  --ink:#3B2F25; --ink2:#6E5C49; --ink3:#9A876F;
  --line:#E4D5BE; --line2:#D9C6A9;
  --accent:#B07A48; --accent-d:#8C5E34; --accent-soft:#E9D5B8; --accent-tint:#F3E6D2;
  --good:#6E8B5B; --good-soft:#E2EAD6; --bad:#B5654B; --bad-soft:#F1DDD3; --gold:#C9A24B;
  --r:18px; --r-lg:26px; --r-sm:12px;
  --sh:0 1px 2px rgba(75,52,33,.05), 0 8px 24px -12px rgba(75,52,33,.18);
  --sh-lg:0 2px 4px rgba(75,52,33,.06), 0 24px 48px -20px rgba(75,52,33,.28);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Nunito',system-ui,sans-serif;color:var(--ink);
  background:
    radial-gradient(1200px 700px at 80% -10%, #F7EFE0 0%, transparent 60%),
    radial-gradient(900px 600px at -10% 110%, #EAD9BE 0%, transparent 55%),
    var(--bg);
  background-attachment:fixed;
  min-height:100dvh;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif;font-weight:600;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
::selection{background:var(--accent-soft)}
.app{max-width:760px;margin:0 auto;padding:0 16px 120px;min-height:100dvh}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;
  padding:14px 4px 12px;margin-bottom:6px;
  background:linear-gradient(var(--bg) 62%, transparent);backdrop-filter:blur(2px)}
.iconbtn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
  background:var(--surface);box-shadow:var(--sh);color:var(--ink);font-size:18px;
  transition:transform .15s, background .15s;flex:0 0 auto}
.iconbtn:active{transform:scale(.92)}
.topbar .ttl{font-family:'Fraunces',serif;font-size:20px;font-weight:600;flex:1;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .sub{font-size:12.5px;color:var(--ink2);font-weight:600}

/* ---------- home ---------- */
.hero{padding:30px 6px 22px}
.brandrow{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.logomark{width:40px;height:40px;border-radius:13px;flex:0 0 auto;position:relative;
  background:linear-gradient(150deg,var(--accent),var(--accent-d));box-shadow:var(--sh);
  display:grid;place-items:center}
.logomark::after{content:"";width:15px;height:15px;border:2.5px solid #FBF6EE;border-radius:50%;
  border-right-color:transparent;border-bottom-color:transparent;transform:rotate(40deg)}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.2px}
.brand small{display:block;font-family:'Nunito';font-weight:700;font-size:10.5px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent-d);margin-top:1px}
.hero h1{font-size:clamp(30px,8vw,42px);line-height:1.05;margin:0 0 12px;font-weight:600}
.hero h1 em{font-style:italic;color:var(--accent-d)}
.hero p{margin:0;color:var(--ink2);max-width:46ch;font-size:15.5px}

.levels-label{display:flex;align-items:center;gap:10px;margin:30px 4px 14px;
  font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2)}
.levels-label::after{content:"";flex:1;height:1px;background:var(--line2)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.level{position:relative;text-align:left;padding:20px 18px 18px;border-radius:var(--r-lg);
  background:var(--surface);box-shadow:var(--sh);overflow:hidden;
  transition:transform .18s, box-shadow .18s;min-height:128px;display:flex;flex-direction:column;
  border:1px solid var(--line)}
.level .code{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1}
.level .name{font-size:13px;color:var(--ink2);font-weight:700;margin-top:3px}
.level .meta{margin-top:auto;font-size:12px;font-weight:700;color:var(--accent-d);
  display:flex;align-items:center;gap:6px}
.level.active{cursor:pointer;border-color:var(--accent-soft)}
.level.active::before{content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(160deg,var(--accent-tint),transparent 70%);opacity:.9}
.level.active>*{position:relative}
.level.active:active{transform:scale(.97)}
.level.active .bar{margin-top:10px;height:7px;border-radius:99px;background:var(--accent-tint);overflow:hidden}
.level.active .bar i{display:block;height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .6s cubic-bezier(.2,.8,.2,1)}
.level.locked{opacity:.62;filter:saturate(.5)}
.level.locked .meta{color:var(--ink3)}
.lock{position:absolute;top:15px;right:15px;font-size:13px;opacity:.55}

/* ---------- generic cards / sections ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--sh);padding:18px}
.section-h{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin:4px 2px 12px;display:flex;align-items:baseline;gap:9px}
.section-h .count{font-family:'Nunito';font-size:12.5px;font-weight:700;color:var(--ink2)}
.lede{color:var(--ink2);font-size:14.5px;margin:0 2px 18px}

/* ---------- mode menu (hub) ---------- */
.hubhead{padding:6px 4px 4px}
.ring-wrap{display:flex;align-items:center;gap:18px;background:var(--surface);
  border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh);margin-bottom:8px}
.ring{--p:0;width:84px;height:84px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  background:conic-gradient(var(--accent) calc(var(--p)*1%), var(--accent-tint) 0)}
.ring::before{content:"";position:absolute;width:64px;height:64px;border-radius:50%;background:var(--surface)}
.ring b{position:relative;font-family:'Fraunces',serif;font-size:21px;font-weight:600}
.ring-wrap .info h3{margin:0 0 3px;font-size:17px}
.ring-wrap .info p{margin:0;font-size:13.5px;color:var(--ink2)}
.streakpill{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:5px 11px;border-radius:99px;
  background:var(--accent-tint);color:var(--accent-d);font-weight:800;font-size:12.5px}

.modes{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.mode{text-align:left;padding:17px 16px;border-radius:var(--r);background:var(--surface);
  border:1px solid var(--line);box-shadow:var(--sh);transition:transform .15s,border-color .15s;
  display:flex;flex-direction:column;gap:8px;min-height:112px}
.mode:active{transform:scale(.97)}
.mode .ic{font-size:21px;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
  background:var(--accent-tint)}
.mode h4{margin:0;font-size:15px;font-family:'Fraunces',serif;font-weight:600}
.mode p{margin:0;font-size:12px;color:var(--ink2);line-height:1.35}
.mode.wide{grid-column:1/-1;flex-direction:row;align-items:center;min-height:0}
.mode.wide .tx{flex:1}

/* ---------- controls ---------- */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--line);border-radius:99px;padding:9px 15px;box-shadow:var(--sh)}
.search input{border:none;background:none;outline:none;width:100%;color:var(--ink)}
.search input::placeholder{color:var(--ink3)}
.sel{background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:9px 13px;
  font-weight:700;font-size:13px;color:var(--ink);box-shadow:var(--sh);outline:none}
.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 8px;margin:-2px -2px 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 14px;border-radius:99px;background:var(--surface);border:1px solid var(--line);
  font-weight:700;font-size:13px;color:var(--ink2);box-shadow:var(--sh);transition:all .15s;white-space:nowrap}
.chip.on{background:var(--accent);border-color:var(--accent);color:#FBF6EE;box-shadow:var(--sh-lg)}

/* ---------- list / table ---------- */
.list{display:flex;flex-direction:column;gap:0;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.row{display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid var(--line);
  transition:background .12s}
.row:last-child{border-bottom:none}
.row:active{background:var(--surface2)}
.row .es{font-family:'Fraunces',serif;font-weight:600;font-size:16.5px;color:var(--ink)}
.row .en{font-size:13.5px;color:var(--ink2);margin-top:1px}
.row .grow{flex:1;min-width:0}
.tag{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;
  border-radius:99px;background:var(--surface2);color:var(--ink2);border:1px solid var(--line)}
.tag.m{color:#5b76b8;background:#e7ecf7;border-color:#d4ddf0}
.tag.f{color:#b5654b;background:var(--bad-soft);border-color:#ecd2c6}
.spk{width:38px;height:38px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  background:var(--accent-tint);color:var(--accent-d);font-size:16px;transition:transform .12s}
.spk:active{transform:scale(.88)}
.check{width:30px;height:30px;border-radius:50%;flex:0 0 auto;border:2px solid var(--line2);
  display:grid;place-items:center;color:transparent;font-size:14px;font-weight:900;transition:all .15s}
.check.on{background:var(--good);border-color:var(--good);color:#fff}
.mxnote{font-size:12px;color:var(--accent-d);margin-top:4px;display:flex;gap:5px;align-items:flex-start}
.mxnote::before{content:"🇲🇽";font-size:11px}

/* ---------- flashcard ---------- */
.flashwrap{display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:6px}
.flashprog{width:100%;height:7px;border-radius:99px;background:var(--accent-tint);overflow:hidden}
.flashprog i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}
.flashcount{font-size:12.5px;font-weight:700;color:var(--ink2)}
.flashcard{width:100%;min-height:280px;perspective:1400px;cursor:pointer}
.flashinner{position:relative;width:100%;height:100%;min-height:280px;transition:transform .55s cubic-bezier(.2,.8,.2,1);transform-style:preserve-3d}
.flashcard.flip .flashinner{transform:rotateY(180deg)}
.flashcard.notrans .flashinner{transition:none!important}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-lg);
  background:var(--surface);border:1px solid var(--line);box-shadow:var(--sh-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;gap:14px}
.face.back{transform:rotateY(180deg);background:linear-gradient(165deg,var(--surface),var(--accent-tint))}
.face .word{font-family:'Fraunces',serif;font-size:clamp(30px,9vw,46px);font-weight:600;line-height:1.05}
.face .role{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-d)}
.face .ex{font-size:14px;color:var(--ink2);font-style:italic;max-width:40ch}
.face .ex b{color:var(--ink);font-style:normal}
.face .hint{position:absolute;bottom:16px;font-size:11.5px;color:var(--ink3);font-weight:700}
.flashbtns{display:flex;gap:11px;width:100%}
.btn{flex:1;padding:15px;border-radius:var(--r);font-weight:800;font-size:15px;box-shadow:var(--sh);
  transition:transform .12s;border:1px solid transparent}
.btn:active{transform:scale(.96)}
.btn-good{background:var(--good);color:#fff}
.btn-soft{background:var(--surface);color:var(--ink);border-color:var(--line)}
.btn-accent{background:var(--accent);color:#FBF6EE}
.btn-ghost{background:transparent;border-color:var(--line2);color:var(--ink2);box-shadow:none}

/* ---------- writing / quiz ---------- */
.quiz{display:flex;flex-direction:column;gap:16px}
.prompt{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--sh);padding:24px 20px;text-align:center}
.prompt .lab{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.prompt .q{font-family:'Fraunces',serif;font-size:clamp(22px,6vw,30px);font-weight:600;line-height:1.2}
.answer{display:flex;gap:9px}
.answer input{flex:1;padding:15px 17px;border-radius:var(--r);border:1.5px solid var(--line2);
  background:var(--surface);outline:none;box-shadow:var(--sh);transition:border-color .15s}
.answer input:focus{border-color:var(--accent)}
.feedback{border-radius:var(--r);padding:16px 17px;border:1px solid var(--line);box-shadow:var(--sh);animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.feedback.correct{background:var(--good-soft);border-color:#cfe0bf}
.feedback.almost{background:#F6EFD8;border-color:#e9dcae}
.feedback.wrong{background:var(--bad-soft);border-color:#ecd2c6}
.feedback .verdict{font-family:'Fraunces',serif;font-weight:600;font-size:17px;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.feedback .right{font-size:15px;margin:2px 0}
.feedback .right b{font-family:'Fraunces',serif}
.feedback .ex{font-size:13.5px;color:var(--ink2);font-style:italic;margin-top:7px}
.feedback .why{font-size:13px;color:var(--ink2);margin-top:9px;padding-top:9px;border-top:1px dashed var(--line2)}
.diff ins{background:#cfe7c0;text-decoration:none;border-radius:4px;padding:0 2px}
.diff del{background:#f0cfc4;border-radius:4px;padding:0 2px}

/* ---------- conjugation / grammar tables ---------- */
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:16px}
.tbl caption{caption-side:top;text-align:left;font-family:'Fraunces',serif;font-weight:600;font-size:16px;
  padding:13px 15px 3px;display:flex;align-items:center;gap:8px}
.tbl th,.tbl td{padding:10px 13px;text-align:left;font-size:14px;border-bottom:1px solid var(--line)}
.tbl thead th{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);background:var(--surface2);font-weight:800}
.tbl td.k{font-weight:700;color:var(--ink2);font-size:13px}
.tbl td .v{font-family:'Fraunces',serif;font-weight:600;color:var(--ink)}
.tbl tr:last-child td{border-bottom:none}
.tipbox{background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:var(--r-sm);
  padding:11px 13px;font-size:13px;color:var(--accent-d);margin:-6px 0 18px}
.tipbox b{color:var(--ink)}
.vtype{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;
  border-radius:99px;background:var(--surface2);color:var(--ink2);border:1px solid var(--line)}

/* ---------- progress detail ---------- */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:15px 14px;text-align:center}
.stat b{font-family:'Fraunces',serif;font-size:25px;font-weight:600;display:block}
.stat span{font-size:11.5px;font-weight:700;color:var(--ink2)}
.catbar{display:flex;align-items:center;gap:11px;padding:9px 2px}
.catbar .nm{width:100px;font-size:13px;font-weight:700;color:var(--ink2);text-transform:capitalize}
.catbar .track{flex:1;height:9px;border-radius:99px;background:var(--accent-tint);overflow:hidden}
.catbar .track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--gold))}
.catbar .pct{width:42px;text-align:right;font-size:12px;font-weight:800;color:var(--ink2)}
.danger{color:var(--bad)}
textarea.io{width:100%;min-height:90px;border-radius:var(--r);border:1px solid var(--line2);background:var(--surface);
  padding:12px;color:var(--ink);outline:none;font-size:13px;resize:vertical}

/* ---------- misc ---------- */
.empty{text-align:center;color:var(--ink2);padding:40px 20px;font-size:14.5px}
.notebar{display:flex;gap:9px;align-items:flex-start;background:var(--accent-tint);border:1px solid var(--accent-soft);
  border-radius:var(--r);padding:13px 15px;font-size:13px;color:var(--accent-d);margin-bottom:16px}
.fab{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:40;display:flex;gap:9px;
  background:rgba(251,246,238,.86);backdrop-filter:blur(10px);padding:7px;border-radius:99px;
  box-shadow:var(--sh-lg);border:1px solid var(--line)}
.fab button{padding:11px 17px;border-radius:99px;font-weight:800;font-size:13.5px;color:var(--ink2);transition:all .15s}
.fab button.on{background:var(--accent);color:#FBF6EE;box-shadow:var(--sh)}
.hide{display:none!important}
.fadein{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);z-index:60;
  background:var(--ink);color:#FBF6EE;padding:11px 18px;border-radius:99px;font-weight:700;font-size:13.5px;
  box-shadow:var(--sh-lg);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
:focus-visible{outline:2.5px solid var(--accent-d);outline-offset:2px}

/* ---------- select (today's set) ---------- */
.selrow .num{flex:0 0 auto;width:30px;text-align:right;font-family:'Fraunces',serif;font-size:14px;
  font-weight:600;color:var(--ink3);font-variant-numeric:tabular-nums}
.selrow.sel{background:var(--accent-tint)}
.selrow.sel .es{color:var(--accent-d)}
.selbar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:45;width:calc(100% - 32px);
  max-width:728px;display:flex;gap:10px;background:rgba(251,246,238,.92);backdrop-filter:blur(12px);
  padding:10px;border-radius:99px;box-shadow:var(--sh-lg);border:1px solid var(--line)}
.selbar .btn{margin:0;padding:14px 12px;box-shadow:none}
.selbar #selskip{flex:0 0 auto;padding:14px 18px}
.selbar #selcheck{flex:1}
.selbar #selcheck:disabled{opacity:.5}
#sellist{padding-bottom:88px}

/* ---------- session bar on hub ---------- */
.sessionbar{display:flex;align-items:center;gap:10px;justify-content:space-between;
  background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:var(--r);
  padding:12px 16px;margin-bottom:12px;font-size:14px;color:var(--accent-d)}
.sessionbar b{color:var(--ink)}
.linkbtn{font-weight:800;font-size:13px;color:var(--accent-d);white-space:nowrap}
.linkbtn:active{opacity:.6}
.skipbtn{flex:0 0 auto;padding:8px 14px;border-radius:99px;background:var(--surface);
  border:1px solid var(--line);box-shadow:var(--sh);font-weight:800;font-size:12.5px;color:var(--ink2)}
.skipbtn:active{transform:scale(.94)}

/* ---------- calendar ---------- */
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.calmonth{font-family:'Fraunces',serif;font-weight:600;font-size:16px}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.cal-dow span{text-align:center;font-size:10.5px;font-weight:800;letter-spacing:.04em;color:var(--ink3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-cell{aspect-ratio:1;border-radius:9px;position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--surface2);border:1px solid transparent}
.cal-cell.empty{background:transparent}
.cal-cell .cd{font-size:11px;font-weight:700;color:var(--ink3)}
.cal-cell .cn{font-family:'Fraunces',serif;font-size:13px;font-weight:600;line-height:1}
.cal-cell.lvl0{background:var(--surface2)}
.cal-cell.lvl1{background:#EAD9BE}
.cal-cell.lvl2{background:#D9B98A}
.cal-cell.lvl3{background:#C2925A}
.cal-cell.lvl4{background:var(--accent-d)}
.cal-cell.lvl1 .cd,.cal-cell.lvl2 .cd{color:var(--accent-d)}

<script>
/* ============================================================
   SENDERO — A1 Mexican Spanish trainer
   ============================================================ */
(function(){
"use strict";

/* ---------- data prep ---------- */
const VOCAB = window.VOCAB.map((w,i)=>({...w, id:i}));
const CONJ = window.CONJ, GRAMMAR = window.GRAMMAR, PHRASES = window.PHRASES, FF = window.FALSE_FRIENDS;
const TOTAL = VOCAB.length;
const CATS = [...new Set(VOCAB.map(w=>w.c))];
const POS_LABEL = {n:"noun",v:"verb",adj:"adjective",adv:"adverb",pron:"pronoun",prep:"preposition",
  conj:"conjunction",art:"article",num:"number",int:"interjection",phr:"phrase",q:"question word"};
const FF_MAP = {}; FF.forEach(f=>FF_MAP[f.es]=f);

/* ---------- safe storage (works deployed; degrades in sandbox) ---------- */
const _mem={};
const Store={
  get(k,d){ try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return k in _mem?_mem[k]:d;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){_mem[k]=v;} }
};
const KEY="sendero_a1_v1";
let P = Store.get(KEY,{fam:{},manual:{},streak:0,lastDay:null,dailyCount:0,goal:15,rate:.9,learnedOn:{},session:null});
P.learnedOn = P.learnedOn||{};            // { wordId: "YYYY-M-D" } first day each word was learned
P.fam = P.fam||{}; P.manual = P.manual||{};
function save(){ Store.set(KEY,P); }
function isLearned(id){ return (P.fam[id]||0)>=2 || !!P.manual[id]; }
function learnedCount(){ return VOCAB.filter(w=>isLearned(w.id)).length; }
function todayStr(d){ d=d||new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
/* records the first date a word becomes "learned" (for the calendar); removes it if unlearned */
function recordLearnState(id){
  if(isLearned(id)){ if(!P.learnedOn[id]) P.learnedOn[id]=todayStr(); }
  else if(P.learnedOn[id]) delete P.learnedOn[id];
}
/* one-time backfill: any already-learned word with no date gets today's date */
VOCAB.forEach(w=>{ if(isLearned(w.id)&&!P.learnedOn[w.id]) P.learnedOn[w.id]=todayStr(); });
save();
function bumpDaily(){
  const t=todayStr();
  if(P.lastDay!==t){
    const ys=todayStr(new Date(Date.now()-864e5));
    P.streak = (P.lastDay===ys)? (P.streak||0)+1 : 1;
    P.lastDay=t; P.dailyCount=0;
  }
  P.dailyCount=(P.dailyCount||0)+1; save();
}
function markRight(id){ P.fam[id]=(P.fam[id]||0)+1; recordLearnState(id); bumpDaily(); save(); }
function markWrong(id){ P.fam[id]=0; recordLearnState(id); save(); }

/* ---------- daily set (session) ---------- */
let SESSION=null;                         // null = full A1 · else Set of word ids
function basePool(){ return SESSION ? VOCAB.filter(w=>SESSION.has(w.id)) : VOCAB; }
function poolCats(){ return [...new Set(basePool().map(w=>w.c))]; }
function sessionLearned(){ return SESSION ? [...SESSION].filter(id=>isLearned(id)).length : learnedCount(); }
function sessionSize(){ return SESSION ? SESSION.size : TOTAL; }

/* ---------- speech (Web Speech API, es-MX) ---------- */
let VOICES=[];
function loadVoices(){ try{VOICES=speechSynthesis.getVoices()||[];}catch(e){VOICES=[];} }
if('speechSynthesis'in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function pickVoice(){
  return VOICES.find(v=>/es[-_]MX/i.test(v.lang)) ||
         VOICES.find(v=>/es[-_](419|US|CO|AR)/i.test(v.lang)) ||
         VOICES.find(v=>/^es/i.test(v.lang)) || null;
}
function speak(text){
  if(!('speechSynthesis'in window)){ toast("Audio not supported on this browser"); return; }
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const v=pickVoice(); if(v) u.voice=v;
    u.lang=(v&&v.lang)||'es-MX'; u.rate=P.rate||.9; u.pitch=1;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- tiny helpers ---------- */
const $=(s,r=document)=>r.querySelector(s);
const app=$("#app");
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
let _tt;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove("show"),1700); }
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
function article(w){ if(w.p!=="n")return""; if(w.g==="f")return"la "; if(w.g==="m")return"el "; return""; }
function genderTag(w){ if(w.p!=="n"||!w.g)return""; if(w.g==="mf")return`<span class="tag">m/f</span>`; return `<span class="tag ${w.g}">${w.g==="m"?"el":"la"}</span>`; }

/* ---------- string normalisation & correction engine ---------- */
const stripAccents=s=>s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
function norm(s){ return (s||"").toLowerCase().trim()
  .replace(/[¿¡?!.,;:""'']/g,"").replace(/\s+/g," ").trim(); }
function lev(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    const c=a[i-1]===b[j-1]?0:1;
    dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+c);
  } return dp[m][n];
}
function diffHtml(user,correct){
  // char-level-ish word diff for short answers
  const u=user.split(""),c=correct.split(""); let out="",i=0,j=0;
  // simple LCS-ish via lev backtrack is overkill; show user(strikethrough wrong) + correct
  return `<span class="diff">you wrote <del>${esc(user)}</del> → <ins>${esc(correct)}</ins></span>`;
}
/* returns {status, title, body} ; status: correct|almost|wrong */
function grade(w,raw){
  const target=w.e;
  const u=norm(raw), t=norm(target), tNo=stripAccents(t), uNo=stripAccents(u);
  if(!u) return {status:"wrong",title:"Empty",reveal:true};
  // accepted variants (with article for nouns)
  const accepts=new Set([t]);
  if(w.p==="n"&&(w.g==="m"||w.g==="f")){ accepts.add((w.g==="f"?"la ":"el ")+t); accepts.add((w.g==="f"?"una ":"un ")+t); }
  const acceptsNo=new Set([...accepts].map(stripAccents));

  if(accepts.has(u)) return {status:"correct",title:"¡Correcto!"};
  // article stripped match
  const uStrip=u.replace(/^(el|la|los|las|un|una|unos|unas)\s+/,"");
  if(uStrip===t || stripAccents(uStrip)===tNo){
    // matched but maybe wrong article gender
    const usedArt=(u.match(/^(el|la|un|una)\b/)||[])[0];
    if(usedArt && w.g){
      const okArt = (w.g==="f"?["la","una"]:["el","un"]);
      if(!okArt.includes(usedArt))
        return {status:"almost",title:"Right word, wrong article",
          body:`<b>${esc(w.e)}</b> is <b>${w.g==="f"?"feminine":"masculine"}</b>, so it's <b>${article(w)+w.e}</b>, not <i>${esc(usedArt)} ${esc(w.e)}</i>.`};
    }
    return {status: stripAccents(uStrip)===tNo&&uStrip!==t ? "almost":"correct",
      title: uStrip!==t&&stripAccents(uStrip)===tNo ? "Almost — accent":"¡Correcto!",
      body: uStrip!==t&&stripAccents(uStrip)===tNo ? accentTip(target,raw):null};
  }
  // accent-only difference
  if(uNo===tNo) return {status:"almost",title:"Almost — check the accent",body:accentTip(target,raw)};
  if(acceptsNo.has(uNo)) return {status:"almost",title:"Almost — check the accent",body:accentTip(target,raw)};
  // close (typo)
  const d=lev(uNo,tNo), thresh=Math.max(1,Math.floor(tNo.length*0.25));
  if(d<=thresh) return {status:"wrong",title:"So close!",close:true,body:diffHtml(raw.trim(),target),reveal:true};
  return {status:"wrong",title:"Not quite",reveal:true};
}
function accentTip(correct,raw){
  return `It's <b>${esc(correct)}</b> — you missed an accent. In Spanish the accent (´) marks the stressed syllable and can change meaning, so it counts.`;
}
/* builds the smart explanation shown after answering */
function explain(w){
  let h="";
  if(w.p==="n"&&w.g) h+=`<div class="right"><b>${esc(article(w)+w.e)}</b> — ${esc(w.t)} <span class="vtype">${w.g==="f"?"feminine":w.g==="m"?"masculine":"m/f"}</span></div>`;
  else h+=`<div class="right"><b>${esc(w.e)}</b> — ${esc(w.t)} <span class="vtype">${POS_LABEL[w.p]||w.p}</span></div>`;
  if(w.x) h+=`<div class="ex">“${esc(w.x)}” — ${esc(w.xt||"")}</div>`;
  let why="";
  if(w.m) why+=`🇲🇽 ${esc(w.m)} `;
  if(FF_MAP[w.e]) why+=`⚠️ False friend: looks like “${esc(FF_MAP[w.e].looks)}” but means “${esc(FF_MAP[w.e].means)}”. (${esc(FF_MAP[w.e].fix)}) `;
  if(w.p==="v"&&CONJ[w.e]){ const c=CONJ[w.e]; why+=`Conjugates (present): yo <b>${esc(c.yo)}</b>, tú <b>${esc(c.tu)}</b>, él/ella <b>${esc(c.el)}</b>, nosotros <b>${esc(c.nos)}</b>, ustedes <b>${esc(c.uds)}</b>. `; }
  if(why) h+=`<div class="why">${why}</div>`;
  return h;
}

/* ============================================================
   ROUTER
   ============================================================ */
const Screens={};
let current="home";
function go(name,opt){ current=name; window.scrollTo(0,0); (Screens[name]||Screens.home)(opt||{}); }

function topbar(title,sub,back){
  return `<div class="topbar">
    ${back?`<button class="iconbtn" data-back="${back}" aria-label="Back">‹</button>`:""}
    <div style="flex:1;min-width:0"><div class="ttl">${title}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>
    ${SESSION?`<button class="skipbtn" data-skip="1" aria-label="Exit today's set, study all A1">Skip ›</button>`:""}
  </div>`;
}
app.addEventListener("click",e=>{
  const sk=e.target.closest("[data-skip]"); if(sk){ SESSION=null; go("hub"); return; }
  const b=e.target.closest("[data-back]"); if(b){ go(b.dataset.back); }
});

/* ============================================================
   HOME — six CEFR levels
   ============================================================ */
const LEVELS=[
  {c:"A1",n:"Beginner",active:true},
  {c:"A2",n:"Elementary"},{c:"B1",n:"Intermediate"},
  {c:"B2",n:"Upper-int."},{c:"C1",n:"Advanced"},{c:"C2",n:"Mastery"}
];
Screens.home=function(){
  const pct=Math.round(learnedCount()/TOTAL*100);
  app.innerHTML=`
  <div class="hero fadein">
    <div class="brandrow"><div class="logomark"></div>
      <div class="brand">Sendero<small>Camino al español</small></div></div>
    <h1>Your path to <em>fluent</em> Mexican Spanish.</h1>
    <p>Pick a level to study. Words, flashcards, writing practice, conjugations and grammar — all with native-style audio.</p>
  </div>
  <div class="levels-label">Levels</div>
  <div class="grid">
  ${LEVELS.map(L=>L.active?`
    <button class="level active" data-level="A1">
      <div class="code">${L.c}</div><div class="name">${L.n}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="meta">▸ ${learnedCount()}/${TOTAL} words · ${pct}%</div>
    </button>`:`
    <div class="level locked">
      <div class="lock">🔒</div>
      <div class="code">${L.c}</div><div class="name">${L.n}</div>
      <div class="meta">Coming soon</div>
    </div>`).join("")}
  </div>
  <p class="lede" style="margin-top:26px;text-align:center;font-size:13px">Build the A1 foundation first — every later level reuses this engine.</p>`;
  app.querySelector("[data-level]").onclick=()=>go("select");
};

/* ============================================================
   SELECT — pick today's set of words to study
   ============================================================ */
let selKeep=new Set();          // survives re-render while picking
Screens.select=function(){
  // preload today's saved set (if any) the first time we open the picker
  if(P.session && P.session.date===todayStr() && selKeep.size===0)
    P.session.ids.forEach(id=>selKeep.add(id));
  let q="";
  const draw=()=>{
    let list=VOCAB.filter(w=>{ if(!q)return true;
      const s=stripAccents(q.toLowerCase());
      return stripAccents((w.e+" "+w.t).toLowerCase()).includes(s); });
    $("#sellist").innerHTML=`<div class="list">${list.map((w,k)=>`
      <div class="row selrow ${selKeep.has(w.id)?'sel':''}" data-id="${w.id}">

        <div class="grow"><div class="es">${esc(article(w)+w.e)} ${genderTag(w)}</div>
          <div class="en">${esc(w.t)} ${isLearned(w.id)?'· <span style="color:var(--good)">learned</span>':''}</div></div>
        <button class="spk" aria-label="Hear">🔊</button>

    $("#sellist").querySelectorAll(".selrow").forEach(r=>{
      const id=+r.dataset.id;
      r.querySelector(".spk").onclick=e=>{e.stopPropagation();speak(VOCAB[id].e);};
      r.onclick=()=>{ if(selKeep.has(id))selKeep.delete(id); else selKeep.add(id);

    });

  const updateBar=()=>{ $("#selcount").textContent=selKeep.size; $("#selcheck").disabled=selKeep.size===0; };
  const pickNext=n=>{ const todo=VOCAB.filter(w=>!isLearned(w.id)&&!selKeep.has(w.id));
    todo.slice(0,n).forEach(w=>selKeep.add(w.id)); draw(); updateBar(); };

  app.innerHTML=`${topbar("Today's set","choose words to study","home")}
   <div class="notebar">📋 Tick the words you'll learn today, then press <b>Check</b> to practice just those. Or press <b>Skip</b> to study all of A1.</div>
   <div class="toolbar" style="margin-bottom:8px">

     <button class="chip" id="selclear">Clear</button>
     <div class="search" style="flex:1"><span>🔎</span><input id="selq" placeholder="Find a word…"></div>
   </div>
   <div id="sellist"></div>
   <div class="selbar">
     <button class="btn btn-ghost" id="selskip">Skip → all A1</button>
     <button class="btn btn-accent" id="selcheck"><span id="selcount">0</span> selected · Check ✓</button>
   </div>`;
  $("#selq").oninput=e=>{q=e.target.value;draw();};
  app.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>pickNext(+b.dataset.pick));
  $("#selclear").onclick=()=>{selKeep.clear();draw();updateBar();};
  $("#selskip").onclick=()=>{ SESSION=null; go("hub"); };
  $("#selcheck").onclick=()=>{
    if(!selKeep.size){toast("Pick at least one word");return;}
    SESSION=new Set(selKeep);
    P.session={date:todayStr(),ids:[...selKeep]}; save();
    go("hub");
  };
  draw(); updateBar();
};

/* ============================================================

const MODES=[

   ============================================================ */

Screens.browse=function(){

let wmode="words", wcat="all";

function buildQuiz(){
  if(wcat!=="all"&&!poolCats().includes(wcat)) wcat="all";
  let pool=basePool().filter(w=>wcat==="all"||w.c===wcat);
  if(wmode==="sentences") pool=pool.filter(w=>w.x);
  pool=pool.sort((a,b)=>(P.fam[a.id]||0)-(P.fam[b.id]||0)||Math.random()-.5);
  let queue=shuffle(pool.slice(0,Math.min(30,pool.length))); let i=0;
  app.innerHTML=`${topbar("Writing",SESSION?"today's set · EN → ES":"English → Spanish","hub")}
   <div class="toolbar" style="margin-bottom:10px">
     <button class="chip ${wmode==="words"?"on":""}" id="mw">Words</button>
     <button class="chip ${wmode==="sentences"?"on":""}" id="ms">Sentences</button>
     <select class="sel" id="wcat" style="margin-left:auto">
       <option value="all">All themes</option>
       ${poolCats().map(c=>`<option value="${c}" ${wcat===c?"selected":""}>${c}</option>`).join("")}
     </select>
   </div>
   <div class="notebar">✍️ Type the Spanish. Accents help but I'll tell you if you only missed one. Press Enter to check.</div>
   <div class="quiz fadein" id="q"></div>`;
  $("#mw").onclick=()=>{wmode="words";buildQuiz();};
  $("#ms").onclick=()=>{wmode="sentences";buildQuiz();};
  $("#wcat").onchange=e=>{wcat=e.target.value;buildQuiz();};
  const host=$("#q");
  function ask(){
    if(i>=queue.length){ finish(); return; }
    const w=queue[i];
    const prompt = wmode==="sentences"? w.xt : w.t;
    host.innerHTML=`
      <div class="prompt">
        <div class="lab">Say this in Spanish · ${i+1}/${queue.length}</div>
        <div class="q">${esc(prompt)}</div>
      </div>
      <div class="answer">
        <input id="ans" placeholder="${wmode==="sentences"?"Write the sentence…":"Write the word…"}" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        <button class="btn btn-accent" id="go" style="flex:0 0 auto;padding:0 20px">Check</button>
      </div>
      <div id="fb"></div>`;
    const inp=$("#ans"); inp.focus();
    const submit=()=>check(w);
    $("#go").onclick=submit;
    inp.onkeydown=e=>{ if(e.key==="Enter") submit(); };
  }
  function check(w){
    const raw=$("#ans").value;
    if(!raw.trim()){ toast("Type your answer first"); return; }
    let res;
    if(wmode==="sentences") res=gradeSentence(w,raw); else res=grade(w,raw);
    const ok=res.status==="correct"||res.status==="almost";
    if(res.status==="correct"||res.status==="almost") markRight(w.id); else markWrong(w.id);
    const fb=$("#fb");
    const icon=res.status==="correct"?"✓":res.status==="almost"?"≈":"✕";
    fb.innerHTML=`<div class="feedback ${res.status==="wrong"?"wrong":res.status==="almost"?"almost":"correct"}">
        <div class="verdict">${icon} ${esc(res.title)}</div>
        ${res.body?`<div class="right">${res.body}</div>`:""}
        ${(res.reveal||res.status!=="correct")?explain(w):""}
        <div class="answer" style="margin-top:14px">
          <button class="spk" id="rspk" style="width:42px;height:42px">🔊</button>
          <button class="btn btn-accent" id="next" style="flex:1">Next ›</button>
        </div>
      </div>`;
    $("#rspk").onclick=()=>speak(wmode==="sentences"?w.x:w.e);
    $("#next").onclick=()=>{ i++; ask(); };
    $("#next").focus();
    $("#go").disabled=true; $("#ans").disabled=true;
  }
  function finish(){
    host.innerHTML=`<div class="card fadein" style="text-align:center;padding:34px 22px">
      <div style="font-size:42px">📝</div>
      <h2 style="margin:10px 0 6px">Set finished</h2>
      <p class="lede" style="margin-bottom:18px">Nicely done. A1 progress: <b>${learnedCount()}/${TOTAL}</b> (${Math.round(learnedCount()/TOTAL*100)}%).</p>
      <div class="flashbtns">
        <button class="btn btn-soft" data-back="hub">Back</button>
        <button class="btn btn-accent" id="again2">New set</button>
      </div></div>`;
    $("#again2").onclick=()=>buildQuiz();
  }
  ask();
}
function gradeSentence(w,raw){
  const u=stripAccents(norm(raw)), t=stripAccents(norm(w.x));
  if(u===t) return {status:"correct",title:"¡Perfecto!"};
  const d=lev(u,t);
  if(d<=Math.max(2,Math.floor(t.length*0.15)))
    return {status:"almost",title:"Very close",body:`Target: <b>${esc(w.x)}</b>`};
  // partial credit: share of words right
  const tw=t.split(" "), uw=new Set(u.split(" "));
  const hit=tw.filter(x=>uw.has(x)).length;
  return {status:"wrong",title:hit?`You got ${hit}/${tw.length} words`:"Not quite",
    body:`Target: <b>${esc(w.x)}</b>`,reveal:true};
}

function fallbackCopy(txt,done){ try{ const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); done&&done(); }catch(e){ toast("Couldn't copy automatically — open Progress to copy manually"); } }

/* restore that keeps EVERY field (progress + radar + leech + hours + mined + key) so a paste never breaks the app */
function applyBackup(jsonStr){

    const def={fam:{},manual:{},streak:0,lastDay:null,dailyCount:0,goal:15,rate:.9,learnedOn:{},daily:{},session:null,skill:{},fail:{},studyMin:{},mined:[],apiKey:"",hoursGoal:60};

function conjugate(inf,tense){
  if(COMPOUND[tense]){ const h=conjugate("haber",COMPOUND[tense]); if(!h)return null; const part=participle(inf); return h.map(x=>x+" "+part); }
  if(tense==="impsubj"){ const pret=conjugate(inf,"pret"); if(!pret)return null; const base=pret[5].replace(/ron$/,""); const acc=accentLast(base); return [base+"ra",base+"ras",base+"ra",acc+"ramos",base+"rais",base+"ran"]; }
  const irr=IRR[inf];
  if(irr&&irr[tense]) return irr[tense].slice();
  const type=inf.slice(-2), stem=inf.slice(0,-2), sk=STEM[inf];
  if(tense==="fut"||tense==="cond"){ const fs=FUTSTEM[inf]||inf; return (tense==="fut"?FUTE:CONDE).map(x=>fs+x); }
  const endings=REG[type]&&REG[type][tense];
  if(!endings) return null;
  let stems=[stem,stem,stem,stem,stem,stem];
  if(sk){
    if(tense==="pres"){ const p=stemPrimary(stem,sk); stems=[p,p,p,stem,stem,p]; }
    else if(tense==="sub"){ const p=stemPrimary(stem,sk);
      if(type==="ir"){ const sec=stemSecondary(stem,sk); stems=[p,p,p,sec,sec,p]; }
      else stems=[p,p,p,stem,stem,p]; }
    else if(tense==="pret"&&type==="ir"){ const sec=stemSecondary(stem,sk); stems=[stem,stem,sec,stem,stem,sec]; }
  }
  return endings.map((en,k)=> spell(stems[k],en,inf)+en);
}
function isIrregular(inf){ return IRR_SET.has(inf)||(inf in FUTSTEM); }

/* verbs we can drill: scoped vocab verbs ending -ar/-er/-ir, plus the irregular set */
function verbPool(){
  const fromVocab=basePool().filter(w=>w.p==="v"&&/[aei]r$/.test(w.e)).map(w=>w.e);
  let set=new Set(fromVocab);
  if(!SESSION) Object.keys(IRR).forEach(k=>{if(k!=="ir_")set.add(k);});
  return [...set].filter(v=>/[aei]r$/.test(v));
}

/* multiple-choice decision drill */
function decisionDrill(bankKey,title,sub,skill){
  let deck=shuffle(BANK[bankKey].slice()), i=0, score=0;
  app.innerHTML=`${topbar(title,sub,"hub")}<div class="quiz fadein" id="dq"></div>`;
  const host=$("#dq");
  function ask(){
    if(i>=deck.length){ host.innerHTML=`<div class="card fadein" style="text-align:center;padding:32px">
      <div style="font-size:40px">🎓</div><h2>Done</h2>
      <p class="lede">Score: <b>${score}/${deck.length}</b>.</p>
      <div class="flashbtns"><button class="btn btn-soft" data-back="hub">Back</button>
      <button class="btn btn-accent" id="dr">Again</button></div></div>`;
      $("#dr").onclick=()=>decisionDrill(bankKey,title,sub,skill); return; }
    const it=deck[i];
    host.innerHTML=`<div class="prompt"><div class="lab">${i+1}/${deck.length}</div>
      <div class="q">${esc(it.q)}</div></div>
      <div style="margin-top:14px" id="opts">
        ${it.o.map((o,k)=>`<button class="optbtn" data-k="${k}">${esc(o)}</button>`).join("")}
      </div><div id="dfb"></div>`;
    host.querySelectorAll(".optbtn").forEach(b=>b.onclick=()=>{
      const k=+b.dataset.k, ok=k===it.a;
      if(ok)score++; logAttempt(skill,ok);
      host.querySelectorAll(".optbtn").forEach((x,xi)=>{x.disabled=true; if(xi===it.a)x.classList.add("right"); if(xi===k&&!ok)x.classList.add("wrong");});
      $("#dfb").innerHTML=`<div class="feedback ${ok?"correct":"wrong"}" style="margin-top:12px">
        <div class="verdict">${ok?"✓ Correcto":"✕ It's “"+esc(it.o[it.a])+"”"}</div>
        <div class="why">${esc(it.why)}</div>
        <button class="btn btn-accent" id="dn" style="width:100%;margin-top:12px">Next ›</button></div>`;
      $("#dn").onclick=()=>{i++;ask();};
    });
  }
  ask();
}

let cdTense="pres", cdIrregOnly=false;
function conjDrill(irregOnly){
  cdIrregOnly=!!irregOnly;
  let verbs=verbPool(); if(cdIrregOnly) verbs=verbs.filter(isIrregular);
  if(!verbs.length){ app.innerHTML=`${topbar(cdIrregOnly?"Irregular drill":"Conjugation drill","","hub")}<div class="empty">No ${cdIrregOnly?"irregular ":""}verbs ${SESSION?"in today's set":"available"}.</div>`; return; }
  let i=0, n=0, correct=0, t0=Date.now();
  const pickQ=()=>{ const v=verbs[Math.random()*verbs.length|0]; const p=Math.random()*6|0;
    return {v,p,ans:(conjugate(v,cdTense)||[])[p]}; };
  let cur=pickQ();
  app.innerHTML=`${topbar(cdIrregOnly?"Irregular verbs":"Conjugation drill",SESSION?"today's verbs":"against the clock","hub")}
    ${cdIrregOnly?"":`<div class="chips" id="ct">${Object.keys(TENSES).map(t=>`<button class="chip ${cdTense===t?"on":""}" data-t="${t}">${TENSES[t]}</button>`).join("")}</div>`}
    <div class="notebar">⌨️ Type the conjugation. Accents help but near-misses are flagged. <span class="clock" id="clk">0</span></div>
    <div class="quiz fadein" id="cq"></div>`;
  const ct=$("#ct"); if(ct) ct.querySelectorAll("[data-t]").forEach(b=>b.onclick=()=>{cdTense=b.dataset.t;conjDrill(cdIrregOnly);});
  const host=$("#cq");
  const clk=setInterval(()=>{const el=$("#clk"); if(!el){clearInterval(clk);return;} el.textContent=Math.floor((Date.now()-t0)/1000)+"s";},1000);
  function ask(){
    cur=pickQ();
    host.innerHTML=`<div class="prompt"><div class="lab">${TENSES[cdTense]} · ${n+1}</div>
      <div class="q">${esc(cur.v)}</div>
      <div class="lede" style="margin-top:6px">${PERS[cur.p]} ${isIrregular(cur.v)?'· <span class="vtype">irregular</span>':''}</div></div>
      <div class="answer"><input id="cans" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="conjugate…">
      <button class="btn btn-accent" id="cgo" style="flex:0 0 auto;padding:0 18px">Check</button></div><div id="cfb"></div>`;
    const inp=$("#cans"); inp.focus();
    const go2=()=>check(); $("#cgo").onclick=go2; inp.onkeydown=e=>{if(e.key==="Enter")go2();};
  }
  function check(){
    const raw=$("#cans").value.trim(); if(!raw){toast("Type a form");return;}
    const ans=cur.ans||""; const ok=stripAccents(norm(raw))===stripAccents(norm(ans));
    const exact=norm(raw)===norm(ans);
    n++; if(ok)correct++; logAttempt("conj-"+cdTense, ok);
    $("#cfb").innerHTML=`<div class="feedback ${exact?"correct":ok?"almost":"wrong"}" style="margin-top:8px">
      <div class="verdict">${exact?"✓ Correcto":ok?"≈ Right — watch the accent":"✕ "+esc(ans)}</div>
      <div class="right"><b>${esc(cur.v)}</b> · ${PERS[cur.p]} · ${TENSES[cdTense]} → <b>${esc(ans)}</b></div>
      <div class="miniconj">Full ${TENSES[cdTense]}: ${PERS_SHORT.map((p,k)=>`${p} <b>${esc((conjugate(cur.v,cdTense)||[])[k]||"–")}</b>`).join(" · ")}</div>
      <div class="answer" style="margin-top:12px"><button class="spk" id="csp">🔊</button>
      <button class="btn btn-accent" id="cn" style="flex:1">Next ›</button></div></div>`;
    $("#csp").onclick=()=>speak(ans); $("#cn").onclick=ask; $("#cn").focus();
    $("#cgo").disabled=true; $("#cans").disabled=true;
  }
  ask();
}

    const v=verbs[Math.random()*verbs.length|0]; const tk=Object.keys(TENSES)[Math.random()*6|0]; const p=Math.random()*6|0;

Screens.cloze=function(){

  if(!pool.length){app.innerHTML=`${topbar("Cloze","","hub")}<div class="empty">No example sentences in scope for cloze. (Words with examples are needed.)</div>`;return;}
  pool=shuffle(pool).slice(0,Math.min(20,pool.length)); let i=0,score=0;
  app.innerHTML=`${topbar("Cloze deletion",SESSION?"today's set":"recall in context","hub")}
    <div class="notebar">🧩 Fill the blank with the missing Spanish word. Context does the teaching.</div>
    <div class="quiz fadein" id="zq"></div>`;
  const host=$("#zq");
  function ask(){
    if(i>=pool.length){host.innerHTML=`<div class="card fadein" style="text-align:center;padding:28px"><div style="font-size:38px">🧩</div><h2>${score}/${pool.length}</h2>
      <div class="flashbtns"><button class="btn btn-soft" data-back="hub">Back</button><button class="btn btn-accent" id="zn">Again</button></div></div>`;$("#zn").onclick=()=>Screens.cloze();return;}
    const w=pool[i]; const re=new RegExp(w.e.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i");
    const blanked=w.x.replace(re,"_____");
    host.innerHTML=`<div class="prompt"><div class="lab">${i+1}/${pool.length}</div>
      <div class="q" style="font-size:clamp(18px,5vw,24px)">${esc(blanked)}</div>

      <div class="answer"><input id="zans" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="missing word…">
      <button class="btn btn-accent" id="zgo" style="flex:0 0 auto;padding:0 18px">Check</button></div><div id="zfb"></div>`;
    const inp=$("#zans");inp.focus();
    const g=()=>{const raw=inp.value.trim();if(!raw){toast("Type the word");return;}
      const ok=stripAccents(norm(raw))===stripAccents(norm(w.e));
      if(ok){score++;markRight(w.id);}else{markWrong(w.id);failWord(w.id);} logAttempt("cloze",ok);
      $("#zfb").innerHTML=`<div class="feedback ${ok?"correct":"wrong"}" style="margin-top:8px">
        <div class="verdict">${ok?"✓ Correcto":"✕ "+esc(w.e)}</div>
        <div class="right">${esc(w.x)}</div>

      $("#zsp").onclick=()=>speak(w.x);$("#zn2").onclick=()=>{i++;ask();};$("#zgo").disabled=true;inp.disabled=true;};
    $("#zgo").onclick=g;inp.onkeydown=e=>{if(e.key==="Enter")g();};
  }
  ask();
};

Screens.scramble=function(){
  let src=[...PHRASES.map(p=>p.e), ...basePool().filter(w=>w.x).map(w=>w.x)];
  src=[...new Set(src)].filter(s=>s.split(" ").length>=3 && s.split(" ").length<=9);
  if(!src.length){app.innerHTML=`${topbar("Sentence scramble","","hub")}<div class="empty">No sentences in scope.</div>`;return;}
  let deck=shuffle(src).slice(0,12), i=0, score=0;
  app.innerHTML=`${topbar("Sentence scramble","rebuild the sentence","hub")}<div class="quiz fadein" id="sq"></div>`;
  const host=$("#sq");
  function ask(){
    if(i>=deck.length){host.innerHTML=`<div class="card fadein" style="text-align:center;padding:28px"><div style="font-size:38px">🧱</div><h2>${score}/${deck.length}</h2>
      <div class="flashbtns"><button class="btn btn-soft" data-back="hub">Back</button><button class="btn btn-accent" id="sn">Again</button></div></div>`;$("#sn").onclick=()=>Screens.scramble();return;}
    const sent=deck[i]; const words=sent.replace(/[¿?¡!.,]/g,"").split(" ").filter(Boolean);
    let bag=shuffle(words.map((w,k)=>({w,k}))); let built=[];
    host.innerHTML=`<div class="prompt"><div class="lab">Tap in order · ${i+1}/${deck.length}</div>
      <div class="tokarea" id="built"><span style="color:var(--ink3);font-size:13px">your sentence…</span></div></div>
      <div id="bag" style="text-align:center;margin-top:10px"></div>
      <div class="flashbtns" style="margin-top:14px"><button class="btn btn-soft" id="undo">⌫ Undo</button>
        <button class="btn btn-accent" id="chk">Check</button></div><div id="sfb"></div>`;
    const drawBag=()=>{ $("#bag").innerHTML=bag.map((t,bi)=>`<button class="tok" data-bi="${bi}">${esc(t.w)}</button>`).join("");
      $("#bag").querySelectorAll(".tok").forEach(b=>b.onclick=()=>{const bi=+b.dataset.bi;built.push(bag[bi]);bag.splice(bi,1);drawBuilt();drawBag();});};
    const drawBuilt=()=>{ $("#built").innerHTML=built.length?built.map(t=>`<span class="tok" style="margin:3px">${esc(t.w)}</span>`).join(""):`<span style="color:var(--ink3);font-size:13px">your sentence…</span>`;};
    drawBag();
    $("#undo").onclick=()=>{if(built.length){bag.push(built.pop());drawBuilt();drawBag();}};
    $("#chk").onclick=()=>{
      const made=built.map(t=>t.w).join(" "); const target=words.join(" ");
      const ok=stripAccents(made.toLowerCase())===stripAccents(target.toLowerCase());
      if(ok)score++; logAttempt("word-order",ok);
      $("#sfb").innerHTML=`<div class="feedback ${ok?"correct":"wrong"}" style="margin-top:10px">

      $("#ssp").onclick=()=>speak(sent);$("#sn2").onclick=()=>{i++;ask();};
    };
  }
  ask();
};

async function aiComplete(system,user){
  if(!P.apiKey) return {error:"no-key"};
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"content-type":"application/json","x-api-key":P.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-3-5-haiku-latest",max_tokens:700,system,messages:[{role:"user",content:user}]})});
    if(!res.ok) return {error:"HTTP "+res.status};
    const data=await res.json();
    return {text:(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n")};
  }catch(e){ return {error:String(e)}; }
}

  } else if(libTab==="phr"){
    host.innerHTML=`<div class="list">${PHRASES.map(p=>`<div class="row" data-w="${esc(p.e)}"><div class="grow"><div class="es">${esc(p.e)}</div><div class="en">${esc(p.t)}</div></div><button class="spk">🔊</button></div>`).join("")}</div>`;
    host.querySelectorAll(".row").forEach(r=>r.querySelector(".spk").onclick=()=>speak(r.dataset.w));

Screens.hub=function(){

  app.innerHTML=`${topbar(inS?"Today's set":"A1 · Beginner", inS?`${tot} words · studying just these`:"Mexican Spanish","home")}
  <div class="fadein">
  ${inS?`<div class="sessionbar"><span>🎯 Studying today's set of <b>${tot}</b> words — every mode below is limited to these.</span>
